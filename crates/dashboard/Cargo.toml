[package]
name = "dashboard"
version = "0.1.0"
edition = "2024"
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[dependencies]
# Dashboard re-exports Tsdb (the legacy in-memory store) so consumers
# that want it can stay on the legacy path.
metriken-query = { workspace = true, features = ["legacy"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
include_dir.workspace = true

[dev-dependencies]
tempfile = "3"
