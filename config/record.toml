# Example configuration for `rezolus record --config record.toml`.
#
# The recorder pulls metrics from one or more HTTP endpoints (Rezolus agent
# msgpack or Prometheus text) and/or reads AMD GPU hardware performance counters
# (PMU) directly from the local host, writing everything to a parquet file.
#
# CLI flags override the values set here (see `rezolus record --help`).

[recording]
# Collection interval (humantime). Default: "1s".
interval = "1s"

# Output path (required).
output = "/tmp/rezolus.parquet"

# Output format: "parquet" (default) or "raw".
# format = "parquet"

# Write one file per source instead of combining into one. Default: false.
# separate = false

# ---------------------------------------------------------------------------
# HTTP endpoints to scrape. Repeat the [[endpoints]] table for each source.
# At least one endpoint OR a [gpu_amd_pmu] section is required.
#
# Only `url` is required. `source`, `role`, and `protocol` are optional and are
# auto-detected when omitted (msgpack -> "rezolus", prometheus -> URL-derived).
# ---------------------------------------------------------------------------

[[endpoints]]
url = "http://localhost:4241"
# source = "rezolus"
# role = "service"            # "service" | "loadgen"
# protocol = "msgpack"        # "msgpack" | "prometheus"

# [[endpoints]]
# url = "http://host:9090/metrics"
# source = "llm-perf"
# role = "loadgen"
# protocol = "prometheus"

# ---------------------------------------------------------------------------
# On-demand AMD GPU PMU recording (Linux only; requires CAP_PERFMON and a
# working ROCm runtime). Reads the GPU's hardware counters directly — no agent
# required. Configured the same way as the agent's `gpu_amd_pmu` sampler.
#
# Equivalent CLI flags:
#   --gpu-amd-pmu
#   --gpu-amd-pmu-gpus 0,1
#   --gpu-amd-pmu-events GRBM_COUNT,SQ_WAVES,...
#   --gpu-perf-level stable_std
# ---------------------------------------------------------------------------

# [gpu_amd_pmu]
# Enable PMU recording. Defaults to true when this section is present.
# enabled = true
#
# GPU indices to record. Omit to record every detected GPU. Indices match the
# agent sampler's GPU numbering.
# gpus = [0]
#
# AMD GPU performance level to set before recording. Omit to leave the GPU
# power state untouched. Many RDNA per-SIMD PMU counters (VALU/SALU/LDS
# instructions, L2/VRAM bandwidth) only read non-zero in a stable power state.
# One of: auto, low, high, manual, stable_std, stable_peak, stable_min_mclk,
# stable_min_sclk, determinism. Requires amd-smi on PATH and root.
# gpu_perf_level = "stable_std"
#
# PMU event (counter) names. Omit to use the same default set as the
# gpu_amd_pmu sampler. See docs/amd_gpu_pmu_events.md for the full catalog.
# events = [
#     "GRBM_COUNT",
#     "GRBM_GUI_ACTIVE",
#     "SQ_WAVES",
#     "SQ_BUSY_CYCLES",
#     "SQ_WAVE_CYCLES",
#     "SQ_INSTS_VALU",
#     "SQ_INSTS_SALU",
#     "SQ_INSTS_LDS",
#     "SQC_ICACHE_REQ",
#     "SQC_ICACHE_HITS",
#     "GL2C_EA_RDREQ",
#     "GL2C_EA_WRREQ",
#     "GL2C_HIT",
#     "GL2C_MISS",
# ]
