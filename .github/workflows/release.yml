# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release

on:
  push:
    tags:
      - "v*"

permissions: write-all

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUST_BACKTRACE: 1
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-deb:
    if: github.repository == 'iopsystems/rezolus'
    name: "deb ${{ matrix.distro }}:${{ matrix.release }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        include:
          # debian
          - { distro: debian, release: bullseye, arch: x86_64 }
          - { distro: debian, release: bullseye, arch: arm64 }
          - { distro: debian, release: bookworm, arch: x86_64 }
          - { distro: debian, release: bookworm, arch: arm64 }
          - { distro: debian, release: trixie, arch: x86_64 }
          - { distro: debian, release: trixie, arch: arm64 }

          # ubuntu
          - { distro: ubuntu, release: focal, arch: x86_64 } # 20.04
          - { distro: ubuntu, release: jammy, arch: x86_64 } # 22.04
          - { distro: ubuntu, release: jammy, arch: arm64 } # 22.04
          - { distro: ubuntu, release: noble, arch: x86_64 } # 24.04
          - { distro: ubuntu, release: noble, arch: arm64 } # 24.04
      fail-fast: false
    env:
      DEB_BUILD_OPTS: nocheck
    steps:
      - uses: actions/checkout@v5

      - name: run packaging script
        run: |
          mkdir -p target/debian
          docker run --rm                   \
            -v $(pwd):/mnt/rezolus              \
            -v $(pwd)/target/debian:/mnt/output \
            ${{ matrix.distro }}:${{ matrix.release }} \
            /mnt/rezolus/debian/package.sh      \
            --release "0"                       \
            --chown "$(id -u)"                  \
            --verbose

      - uses: actions/upload-artifact@v5
        with:
          path: target/debian/*
          name: deb_${{ matrix.distro }}_${{ matrix.release }}_${{ matrix.arch }}

  build-rpm:
    if: github.repository == 'iopsystems/rezolus'
    name: "rpm ${{ matrix.distro }}:${{ matrix.version }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    container: "${{ matrix.distro }}:${{ matrix.version }}"
    strategy:
      matrix:
        include:
          - { distro: rockylinux, version: 9, arch: x86_64 }
          - { distro: rockylinux, version: 9, arch: arm64 }
          - { distro: amazonlinux, version: 2023, arch: x86_64 }
          - { distro: amazonlinux, version: 2023, arch: arm64 }
      fail-fast: false
    steps:
      - name: install basic dependencies
        if: matrix.distro == 'amazonlinux'
        shell: bash
        run: |
          yum install -y tar gzip

      - uses: actions/checkout@v5

      - name: install rust
        run: |
          curl -sSf https://sh.rustup.rs | sh /dev/stdin -y
          echo "PATH=$HOME/.cargo/bin:$PATH" >> "$GITHUB_ENV"

      - name: install build dependencies
        shell: bash
        run: |
          yum install -y gcc elfutils-devel clang openssl-devel

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-rpm-${{ matrix.distro }}-${{ matrix.version}}-${{ matrix.arch }}

      - name: build
        shell: bash
        run: |
          cargo build --release --locked

      - name: package
        shell: bash
        run: |
          # Version from the tag being released (release.yml triggers on tags).
          FULL_VERSION="${GITHUB_REF_NAME#v}"

          # RPM arch from the build matrix (arm64 -> aarch64).
          RPM_ARCH=$([ "${{ matrix.arch }}" = "arm64" ] && echo aarch64 || echo x86_64)

          # Split semver prerelease into RPM Version/Release. The leading 0.
          # makes prereleases sort before the eventual GA (Release=1).
          if [[ "$FULL_VERSION" == *"-alpha"* ]]; then
            RPM_VERSION=$(echo "$FULL_VERSION" | cut -d'-' -f1)
            ALPHA_VERSION=$(echo "$FULL_VERSION" | sed 's/.*-alpha\.//')
            RPM_RELEASE="0.1.alpha.${ALPHA_VERSION}"
          elif [[ "$FULL_VERSION" == *"-beta"* ]]; then
            RPM_VERSION=$(echo "$FULL_VERSION" | cut -d'-' -f1)
            BETA_VERSION=$(echo "$FULL_VERSION" | sed 's/.*-beta\.//')
            RPM_RELEASE="0.2.beta.${BETA_VERSION}"
          elif [[ "$FULL_VERSION" == *"-rc"* ]]; then
            RPM_VERSION=$(echo "$FULL_VERSION" | cut -d'-' -f1)
            RC_VERSION=$(echo "$FULL_VERSION" | sed 's/.*-rc\.//')
            RPM_RELEASE="0.3.rc.${RC_VERSION}"
          else
            RPM_VERSION="$FULL_VERSION"
            RPM_RELEASE="1"
          fi
          echo "Building rpm: Version=$RPM_VERSION Release=$RPM_RELEASE Arch=$RPM_ARCH"

          # rpm-build provides rpmbuild (not in the minimal container image).
          yum install -y rpm-build

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS} target/generate-rpm

          sed -e "s/@NAME@/rezolus/g" \
              -e "s/@VERSION@/${RPM_VERSION}/g" \
              -e "s/@RELEASE@/${RPM_RELEASE}/g" \
              -e "s/@ARCH@/${RPM_ARCH}/g" \
              rpm/rezolus.spec.template > ~/rpmbuild/SPECS/rezolus.spec

          rpmbuild -bb \
            --define "_topdir $HOME/rpmbuild" \
            --define "_sourcedir $GITHUB_WORKSPACE" \
            --define "_binary_payload w9.gzdio" \
            ~/rpmbuild/SPECS/rezolus.spec

          # Keep the output path so the sign + upload-artifact steps are unchanged.
          mv ~/rpmbuild/RPMS/*/*.rpm target/generate-rpm/

          echo "Built rpms:"
          for rpm in target/generate-rpm/*.rpm; do
            rpm -qp --qf "  %{NAME} %{VERSION} %{RELEASE} %{ARCH} ARCHIVESIZE=%{ARCHIVESIZE}\n" "$rpm"
          done

      - name: sign RPM packages
        shell: bash
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "No GPG signing key configured, skipping."
            exit 0
          fi
          # Install GPG agent and pinentry (not present in minimal container images)
          yum install -y --allowerasing gnupg2 pinentry

          # Import the GPG signing key
          echo "$GPG_SIGNING_KEY" | base64 -d | gpg --batch --import

          # Get the key ID
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "Signing with key: $GPG_KEY_ID"

          # Configure RPM macros for signing
          cat > ~/.rpmmacros << MACROS
          %_gpg_name ${GPG_KEY_ID}
          %__gpg_sign_cmd %{__gpg} gpg --batch --pinentry-mode loopback --no-verbose --no-armor --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          MACROS

          # Install rpm-sign (provides rpmsign binary needed by rpm --addsign)
          yum install -y rpm-sign

          # Sign each RPM
          for rpm in target/generate-rpm/*.rpm; do
            echo "Signing $(basename $rpm)..."
            rpm --addsign "$rpm"
          done

          # Import public key into RPM's keyring for verification
          gpg --export -a "$GPG_KEY_ID" > /tmp/rpm-signing-key.pub
          rpm --import /tmp/rpm-signing-key.pub

          # Verify signatures
          echo ""
          echo "Verifying RPM signatures:"
          for rpm in target/generate-rpm/*.rpm; do
            echo "$(basename $rpm):"
            rpm --checksig "$rpm"
          done

      - uses: actions/upload-artifact@v5
        with:
          path: target/generate-rpm/*
          name: rpm_${{ matrix.distro }}_${{ matrix.version }}_${{ matrix.arch }}

  build-viewer-static:
    if: github.repository == 'iopsystems/rezolus'
    name: build static viewer bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: install wasm-pack
        run: cargo install wasm-pack --version ^0.14 --locked

      - name: build wasm viewer
        run: ./crates/viewer/build.sh

      - name: stage viewer bundle
        run: |
          TAG="${{ github.ref_name }}"
          STAGE="target/viewer-static/rezolus-viewer-${TAG}"
          mkdir -p "$STAGE"
          # Dereference symlinks (site/viewer/lib/* points back into
          # src/viewer/assets/lib) so the tarball is self-contained.
          # Skip data/ — demo parquets aren't part of the package.
          rsync -aL --exclude='data' site/viewer/ "$STAGE/"
          cp LICENSE-MIT LICENSE-APACHE "$STAGE/" 2>/dev/null || true
          cat > "$STAGE/README.md" << 'EOF'
          # Rezolus Viewer (static bundle)

          This bundle is a self-contained Rezolus parquet viewer that runs
          entirely in the browser via WebAssembly. Drop the directory on
          any static webserver (nginx, caddy, S3 + CloudFront, GitHub
          Pages, `python -m http.server`, …) and visit `/viewer/`.

          ## Loading recordings

          The viewer accepts parquet recordings via:

          - **Drag-and-drop / file picker** on the landing page.
          - **`?capture=label=path/to/file.parquet`** in the URL — relative
            paths are fetched from the same origin.
          - **`?capture=label=https://...`** for absolute URLs — requires
            either CORS headers on the source, or the local proxy
            (see "Loading from arbitrary URLs" below).

          Two `?capture=` params (separated by `&`) put the viewer in
          A/B compare mode.

          ## Loading from arbitrary URLs

          Cross-origin parquet URLs (e.g. another team's S3 bucket, a
          colleague's webserver) only work when the source serves CORS
          headers — most don't. To bypass that, run the full `rezolus`
          binary with `rezolus view --proxy-allow=<glob>`; the local
          proxy fetches the URL server-side and streams it to the
          browser.

          ## Customising

          - Demo parquets go in `data/` (not shipped in this bundle).
          - Service-extension templates live under `templates/`.
          - Frontend overrides go in `lib/` — the layout mirrors the
            in-tree `src/viewer/assets/lib/` so existing patches apply.
          EOF

      - name: tarball viewer bundle
        run: |
          TAG="${{ github.ref_name }}"
          cd target/viewer-static
          tar -czf "rezolus-viewer-${TAG}.tar.gz" "rezolus-viewer-${TAG}"
          ls -l "rezolus-viewer-${TAG}.tar.gz"

      - uses: actions/upload-artifact@v5
        with:
          path: target/viewer-static/rezolus-viewer-*.tar.gz
          name: viewer-static

  publish:
    if: github.repository == 'iopsystems/rezolus'
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-rpm
      - build-viewer-static
    steps:
      - uses: actions/checkout@v5

      - name: check release type
        id: check-release
        run: |
          TAG="${{ github.ref_name }}"

          # Check if this is a stable release (no + or -)
          if [[ "$TAG" == *"+"* ]] || [[ "$TAG" == *"-"* ]]; then
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "Non-stable release detected: $TAG"
          else
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "Stable release detected: $TAG"
          fi

      # Download deb artifacts
      - uses: actions/download-artifact@v5
        with:
          path: target/artifacts/
          pattern: deb_*

      # Download rpm artifacts
      - uses: actions/download-artifact@v5
        with:
          path: target/rpm/
          pattern: rpm_*

      # Download static viewer bundle
      - uses: actions/download-artifact@v5
        with:
          path: target/viewer-static/
          pattern: viewer-static

      # Upload debs to systemslab registry (stable releases only)
      - uses: google-github-actions/auth@v2
        if: steps.check-release.outputs.is_stable == 'true'
        id: auth-systemslab
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check-release.outputs.is_stable == 'true'

      - name: upload debs to systemslab registry (stable releases only)
        if: steps.check-release.outputs.is_stable == 'true'
        run: |
          gcloud config set artifacts/repository systemslab
          gcloud config set artifacts/location us

          for artifact in target/artifacts/deb_*/*; do
            [ -f "$artifact" ] || continue
            name="$(basename "$artifact")"
            directory="$(basename "$(dirname "$artifact")")"
            # directory format: deb_<distro>_<release>_<arch>
            release="$(echo "$directory" | cut -d _ -f 3)"

            echo "::group::upload to systemslab $release $name"
            gcloud artifacts apt upload "$release" --source "$artifact"
            gcloud artifacts apt upload "$release-public" --source "$artifact"
            echo "::endgroup::"
          done

      # Upload debs to rezolus registry (stable releases only)
      - uses: google-github-actions/auth@v2
        if: steps.check-release.outputs.is_stable == 'true'
        id: auth-rezolus
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS_REZOLUS }}"

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check-release.outputs.is_stable == 'true'

      - name: upload debs to rezolus registry (stable releases only)
        if: steps.check-release.outputs.is_stable == 'true'
        run: |
          gcloud config set artifacts/location us

          for artifact in target/artifacts/deb_*/*; do
            [ -f "$artifact" ] || continue
            name="$(basename "$artifact")"
            directory="$(basename "$(dirname "$artifact")")"
            # directory format: deb_<distro>_<release>_<arch>
            distro="$(echo "$directory" | cut -d _ -f 2)"
            release="$(echo "$directory" | cut -d _ -f 3)"

            repo_name="${distro}-${release}"

            echo "::group::upload to $repo_name repository: $name"
            gcloud artifacts apt upload "$repo_name" \
              --source="$artifact" \
              --quiet
            echo "::endgroup::"
          done

      # Upload rpms to rezolus registry (stable releases only)
      - name: upload rpms to rezolus registry (stable releases only)
        if: steps.check-release.outputs.is_stable == 'true'
        run: |
          gcloud config set artifacts/location us

          for artifact in target/rpm/rpm_*/*; do
            [ -f "$artifact" ] || continue
            name="$(basename "$artifact")"
            directory="$(basename "$(dirname "$artifact")")"
            # directory format: rpm_<distro>_<version>_<arch>
            distro="$(echo "$directory" | cut -d _ -f 2)"
            version="$(echo "$directory" | cut -d _ -f 3)"

            # Map distro names to repository names
            case "$distro" in
              rockylinux)
                repo_name="rocky${version}"
                ;;
              amazonlinux)
                repo_name="al${version}"
                ;;
              *)
                repo_name="${distro}${version}"
                ;;
            esac

            echo "::group::upload to $repo_name repository: $name"
            gcloud artifacts yum upload "$repo_name" \
              --source="$artifact" \
              --quiet
            echo "::endgroup::"
          done

      # Create GitHub release with all artifacts
      - name: prepare release artifacts
        run: |
          mkdir -p target/release-artifacts

          # Collect deb packages
          for artifact in target/artifacts/deb_*/*; do
            [ -f "$artifact" ] || continue
            name="$(basename "$artifact")"
            directory="$(basename "$(dirname "$artifact")")"
            distro="$(echo "$directory" | cut -d _ -f 2)"
            release="$(echo "$directory" | cut -d _ -f 3)"
            arch="$(echo "$directory" | cut -d _ -f 4)"
            mv "$artifact" "target/release-artifacts/${distro}_${release}_${arch}_${name}"
          done

          # Collect rpm packages
          for artifact in target/rpm/rpm_*/*; do
            [ -f "$artifact" ] || continue
            name="$(basename "$artifact")"
            directory="$(basename "$(dirname "$artifact")")"
            distro="$(echo "$directory" | cut -d _ -f 2)"
            version="$(echo "$directory" | cut -d _ -f 3)"
            arch="$(echo "$directory" | cut -d _ -f 4)"
            mv "$artifact" "target/release-artifacts/${distro}_${version}_${arch}_${name}"
          done

          # Collect static viewer bundle. `actions/download-artifact@v5` with
          # `pattern:` nests files under `<path>/<artifact_name>/...`, but
          # `upload-artifact`'s preserved relative path can add extra levels.
          # `find` locates the tarball regardless of how deep it lands.
          find target/viewer-static -type f -name 'rezolus-viewer-*.tar.gz' \
            -exec mv -t target/release-artifacts/ {} +

      - name: generate checksums and sign release artifacts
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          cd target/release-artifacts

          # Generate SHA256 checksums for all artifacts
          sha256sum * > SHA256SUMS

          echo "Generated checksums:"
          cat SHA256SUMS

          # Sign the checksums file if GPG key is available
          if [ -n "$GPG_SIGNING_KEY" ]; then
            echo "$GPG_SIGNING_KEY" | base64 -d | gpg --batch --import

            gpg --batch --pinentry-mode loopback \
              --detach-sign --armor SHA256SUMS

            echo "Checksums signed: SHA256SUMS.asc"
          else
            echo "GPG key not configured, skipping signature"
          fi

      - name: extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          CHANGELOG=$(awk '/^## \['"$VERSION"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | sed '/^$/d')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release v$VERSION"
          fi

          # Write to file for gh release
          echo "$CHANGELOG" > /tmp/release-notes.md

      - name: create GitHub release
        run: |
          # Mark non-stable tags (anything with '-' or '+', e.g. -alpha.N) as
          # GitHub pre-releases so they don't become the "Latest" release.
          PRERELEASE=""
          if [ "${{ steps.check-release.outputs.is_stable }}" != "true" ]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            $PRERELEASE \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md \
            target/release-artifacts/*

      # Update Homebrew formula
      - name: set up Homebrew
        if: steps.check-release.outputs.is_stable == 'true'
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: set up git for Homebrew
        if: steps.check-release.outputs.is_stable == 'true'
        uses: Homebrew/actions/git-user-config@main

      - name: update Homebrew formula
        if: steps.check-release.outputs.is_stable == 'true'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          brew tap iopsystems/iop
          brew bump-formula-pr iopsystems/iop/rezolus \
            --url "https://github.com/iopsystems/rezolus/archive/refs/tags/${TAG}.tar.gz" \
            --version "${VERSION}" \
            --no-fork \
            --no-browse
