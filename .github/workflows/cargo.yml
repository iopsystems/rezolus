name: cargo-build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'site/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt-get -y install libelf-dev
      - name: cargo check
        run: |
          rustup component add rustfmt
          cargo check --all-targets

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt-get -y install libelf-dev
      - name: run clippy
        run: |
          cargo clippy --all-targets --all-features --message-format json \
            | clippy-sarif \
            | tee clippy.sarif \
            | sarif-fmt
        shell: bash
        continue-on-error: true
      - uses: actions/upload-artifact@v5
        with:
          name: clippy-sarif
          path: clippy.sarif

  clippy-upload:
    runs-on: ubuntu-latest
    needs: [ clippy ]
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v5
    - uses: actions/download-artifact@v5
      with:
        name: clippy-sarif
    - uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: clippy.sarif

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-ubuntu-latest
          save-if: false
      - name: install cargo-audit
        run: cargo install cargo-audit
      - run: |
          cargo audit

  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo fmt
        shell: bash
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check

  # SQL-backed WASM viewer (crates/viewer-sql/) is the cdylib half of
  # the static site. It builds for wasm32-unknown-unknown via wasm-pack
  # and produces site/viewer-sql/pkg/, which the static-site deploy
  # consumes. Build it here so Rust-side breakage surfaces at PR time
  # before pages.yml/release.yml run the same build.
  #
  # The wasm-pack version pin (^0.14) also pins binaryen 117, which
  # avoids the binaryen-108-era externref-table misorder bug that
  # broke the previous WASM viewer at runtime.
  wasm-viewer:
    name: wasm-viewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --version ^0.14 --locked
      - name: Rebuild WASM viewer
        run: ./crates/viewer-sql/build.sh
      - name: Check template symlinks are committed
        # Every config/templates/*.json must have a matching symlink in
        # site/viewer/templates/ so the static-site `cp -rL` step picks
        # it up. Without this, the deployed manifest lists templates
        # whose JSON files 404 in the browser. The pre-commit hook
        # enforces this locally; CI re-checks here.
        run: |
          missing=$(git status --porcelain site/viewer/templates/ | awk '$1 == "??" {print $2}')
          if [ -n "$missing" ]; then
            echo "::error::config/templates/ entries are missing symlinks under site/viewer/templates/. Add them so the static-site viewer can serve the JSON:"
            echo "$missing" | sed 's/^/  /'
            exit 1
          fi

  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.set-profiles.outputs.profiles }}
    steps:
      - name: determine build profiles
        id: set-profiles
        run: |
          # PRs build debug only; release builds run on push (to main) and
          # in release.yml at tag time, where packaging happens.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo 'profiles=["debug"]' >> $GITHUB_OUTPUT
          else
            echo 'profiles=["release", "debug"]' >> $GITHUB_OUTPUT
          fi

  # Second group of checks: These are more expensive than the first set so we
  # gate them on the check action succeeding.
  build:
    name: build-${{ matrix.os }}-${{ matrix.profile }}-${{ matrix.features }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04, ubuntu-22.04, macos-latest ]
        profile: ${{ fromJson(needs.setup.outputs.profiles) }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.os }}-${{ matrix.profile }}-${{ matrix.features }}

      - name: Update cargo flags
        if: ${{ matrix.profile == 'release' }}
        run: |
          echo 'FLAGS=--release' >> $GITHUB_ENV
          echo 'CARGO_BUILD_JOBS=2' >> $GITHUB_ENV
          echo 'CARGO_PROFILE_RELEASE_LTO=false' >> $GITHUB_ENV
        shell: bash
      - name: Update cargo flags
        if: ${{ matrix.profile == 'debug' }}
        run: echo 'FLAGS=' >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        if: ${{ matrix.os != 'macos-latest' }}
        shell: bash
        run: |
          sudo apt update
          sudo apt-get -y install libelf-dev
          rustup component add rustfmt

      # viewer-sql is cdylib+rlib — host builds compile the rlib, the
      # WASM cdylib is built separately in the wasm-viewer job above.
      - name: build
        shell: bash
        run: |
          cargo build --workspace ${{ env.FEATURE_FLAGS }} --all-targets --locked ${{ env.FLAGS }}
      - name: test
        shell: bash
        run: |
          cargo test --workspace ${{ env.FEATURE_FLAGS }} --tests --bins --locked ${{ env.FLAGS }}
      - name: doctests
        if: ${{ matrix.profile == 'debug' }}
        shell: bash
        run: |
          cargo test --workspace ${{ env.FEATURE_FLAGS }} --locked -- --test-threads 16
      - name: smoketest
        if: ${{ matrix.profile == 'release' }}
        shell: bash
        run: |
          cargo build ${{ env.FEATURE_FLAGS }} --locked ${{ env.FLAGS }}
          sudo ./target/release/rezolus config/agent.toml & echo $! > agent.pid
          sleep 15
          ./target/release/rezolus record --duration 30s http://127.0.0.1:4241 rezolus.parquet
      - name: smoketest
        if: ${{ matrix.profile == 'debug' }}
        shell: bash
        run: |
          cargo build ${{ env.FEATURE_FLAGS }} --locked ${{ env.FLAGS }}
          sudo ./target/debug/rezolus config/agent.toml & echo $! > agent.pid
          sleep 15
          ./target/debug/rezolus record --duration 30s http://127.0.0.1:4241 rezolus.parquet

  check-success:
    name: verify all tests pass
    if: always()
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
      - check
      - rustfmt
      - clippy
      - clippy-upload

    steps:
      - name: verify
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks failed or were cancelled."
            exit 1
          fi
          echo "All checks passed!"
