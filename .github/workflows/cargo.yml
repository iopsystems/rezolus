name: cargo-build

on:
  push:
    paths-ignore:
      - 'site/**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'site/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  # First stage: these are quick jobs that give immediate feedback on a PR.
  # They already ran while the PR was a draft, so on ready_for_review we
  # skip them and only build the new release matrix added below.
  check:
    name: check
    if: github.event.action != 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-${{ matrix.os }}
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt-get -y install libelf-dev
      - name: cargo check
        run: |
          rustup component add rustfmt
          cargo check --all-targets

  clippy:
    if: github.event.action != 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt-get -y install libelf-dev
      - name: run clippy
        run: |
          cargo clippy --all-targets --all-features --message-format json \
            | clippy-sarif \
            | tee clippy.sarif \
            | sarif-fmt
        shell: bash
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: clippy-sarif
          path: clippy.sarif

  clippy-upload:
    runs-on: ubuntu-latest
    needs: [ clippy ]
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4.1.7
      with:
        name: clippy-sarif
    - uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: clippy.sarif

  audit:
    if: github.event.action != 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-ubuntu-latest
          save-if: false
      - name: install cargo-audit
        run: cargo install cargo-audit
      - run: |
          cargo audit

  rustfmt:
    name: rustfmt
    if: github.event.action != 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo fmt
        shell: bash
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check

  # WASM viewer is wasm32-only and excluded from the regular build
  # matrix above. Build it from source here so Rust-side breakage in
  # crates/viewer/ surfaces at PR time, then structurally validate the
  # rebuilt WASM before the static-site deploy uses the same build path.
  #
  # Building with the wrong binaryen silently produces a broken WASM —
  # e.g. binaryen 108 mis-orders the externref table so the
  # `__wbindgen_externrefs` export points at the locked funcref table,
  # and the JS shim then fails at instantiation with
  # `Table.grow(): failed to grow table by 4`.
  wasm-viewer:
    name: wasm-viewer
    if: github.event.action != 'ready_for_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --version ^0.14 --locked
      - name: Install wabt
        run: sudo apt-get update && sudo apt-get -y install wabt
      - name: Rebuild WASM viewer
        run: ./crates/viewer/build.sh
      - name: Validate rebuilt WASM structure
        run: |
          wasm=site/viewer/pkg/wasm_viewer_bg.wasm
          # Find which table index the JS shim's externref slot is
          # exported from, then confirm that table is actually an
          # externref table. binaryen 108 swaps these and routes the
          # export at the locked funcref table.
          export_idx=$(wasm-objdump -x "$wasm" \
            | grep -E '__wbindgen_externrefs' \
            | grep -oE 'table\[[0-9]+\]' \
            | head -1 \
            | grep -oE '[0-9]+')
          if [ -z "$export_idx" ]; then
            echo "::error file=$wasm::no __wbindgen_externrefs export found"
            exit 1
          fi
          target_table=$(wasm-objdump -x "$wasm" | grep -E "^ - table\\[$export_idx\\] type=")
          if ! echo "$target_table" | grep -q externref; then
            echo "::error file=$wasm::__wbindgen_externrefs is exported from table[$export_idx], which is not an externref table."
            echo ""
            wasm-objdump -x "$wasm" | grep -E '^ - table\[|__wbindgen_externrefs' | sed 's/^/    /'
            echo ""
            echo "Rebuild with the canonical toolchain: ./crates/viewer/build.sh"
            echo "(needs wasm-pack >= 0.14, which pins binaryen 117)."
            exit 1
          fi

  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.set-profiles.outputs.profiles }}
    steps:
      - name: determine build profiles
        id: set-profiles
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.action }}" == "ready_for_review" ]]; then
            # Draft already covered debug; only the release matrix is new.
            echo 'profiles=["release"]' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.draft }}" == "true" ]]; then
            echo 'profiles=["debug"]' >> $GITHUB_OUTPUT
          else
            echo 'profiles=["release", "debug"]' >> $GITHUB_OUTPUT
          fi

  # Second group of checks: These are more expensive than the first set so we
  # gate them on the check action succeeding.
  build:
    name: build-${{ matrix.os }}-${{ matrix.profile }}-${{ matrix.features }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04, ubuntu-22.04, macos-latest ]
        profile: ${{ fromJson(needs.setup.outputs.profiles) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.os }}-${{ matrix.profile }}-${{ matrix.features }}

      - name: Update cargo flags
        if: ${{ matrix.profile == 'release' }}
        run: |
          echo 'FLAGS=--release' >> $GITHUB_ENV
          echo 'CARGO_BUILD_JOBS=2' >> $GITHUB_ENV
          echo 'CARGO_PROFILE_RELEASE_LTO=false' >> $GITHUB_ENV
        shell: bash
      - name: Update cargo flags
        if: ${{ matrix.profile == 'debug' }}
        run: echo 'FLAGS=' >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        if: ${{ matrix.os != 'macos-latest' }}
        shell: bash
        run: |
          sudo apt update
          sudo apt-get -y install libelf-dev
          rustup component add rustfmt

      # viewer is a wasm32-only workspace member; it is built via
      # crates/viewer/build.sh rather than in the main CI pipeline.
      - name: build
        shell: bash
        run: |
          cargo build --workspace --exclude viewer ${{ env.FEATURE_FLAGS }} --all-targets --locked ${{ env.FLAGS }}
      - name: test
        shell: bash
        run: |
          cargo test --workspace --exclude viewer ${{ env.FEATURE_FLAGS }} --tests --bins --locked ${{ env.FLAGS }}
      - name: doctests
        if: ${{ matrix.profile == 'debug' }}
        shell: bash
        run: |
          cargo test --workspace --exclude viewer ${{ env.FEATURE_FLAGS }} --locked -- --test-threads 16
      - name: smoketest
        if: ${{ matrix.profile == 'release' }}
        shell: bash
        run: |
          cargo build ${{ env.FEATURE_FLAGS }} --locked ${{ env.FLAGS }}
          sudo ./target/release/rezolus config/agent.toml & echo $! > agent.pid
          sleep 15
          ./target/release/rezolus record --duration 30s http://127.0.0.1:4241 rezolus.parquet
      - name: smoketest
        if: ${{ matrix.profile == 'debug' }}
        shell: bash
        run: |
          cargo build ${{ env.FEATURE_FLAGS }} --locked ${{ env.FLAGS }}
          sudo ./target/debug/rezolus config/agent.toml & echo $! > agent.pid
          sleep 15
          ./target/debug/rezolus record --duration 30s http://127.0.0.1:4241 rezolus.parquet

  check-success:
    name: verify all tests pass
    # Run even when some deps are skipped (e.g. on ready_for_review the
    # quick-feedback jobs are skipped because the draft already ran them).
    if: always()
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
      - check
      - rustfmt
      - clippy
      - clippy-upload

    steps:
      - name: verify
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks failed or were cancelled."
            exit 1
          fi
          echo "All checks passed!"
