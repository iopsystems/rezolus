name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/viewer/assets/lib/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.repository == 'iopsystems/rezolus'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate static-site templates manifest
        run: |
          (
            cd config/templates
            printf '[\n'
            ls -1 *.json | sort | sed 's/\.json$//' \
              | awk 'BEGIN{first=1} {if(!first)printf ",\n"; printf "  \"%s\"", $0; first=0} END{printf "\n"}'
            printf ']\n'
          ) > site/viewer/templates/manifest.json
      - name: Resolve symlinks
        run: cp -rL site site-resolved
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-resolved
      - id: deployment
        uses: actions/deploy-pages@v4
