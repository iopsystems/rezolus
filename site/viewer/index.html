<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Rezolus Viewer - Browser-based systems performance telemetry viewer" />
    <meta name="theme-color" content="#0a0e14" />

    <title>Rezolus Viewer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script src="lib/mithril.js"></script>
    <script src="lib/charts/echarts.min.js"></script>
    <script type="module" src="lib/script.js"></script>
    <link rel="stylesheet" href="lib/style.css" />

    <style>
        .upload-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .upload-card {
            background: var(--bg-secondary, #141820);
            border: 1px solid var(--border-color, #2a2e3a);
            border-radius: 12px;
            padding: 3rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .upload-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: var(--text-primary, #e0e0e0);
        }
        .upload-subtitle {
            color: var(--text-secondary, #8b8fa3);
            margin: 0 0 0.25rem;
            font-size: 0.95rem;
        }
        .upload-privacy {
            color: var(--accent, #5b9bd5);
            margin: 0 0 2rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .upload-dropzone {
            border: 2px dashed var(--border-color, #2a2e3a);
            border-radius: 8px;
            padding: 2.5rem 1.5rem;
            transition: border-color 0.15s, background 0.15s;
            cursor: pointer;
        }
        .upload-dropzone.dragover {
            border-color: var(--accent, #5b9bd5);
            background: rgba(91, 155, 213, 0.05);
        }
        .upload-icon {
            color: var(--text-secondary, #8b8fa3);
            margin-bottom: 1rem;
        }
        .upload-dropzone p {
            margin: 0.25rem 0;
            color: var(--text-secondary, #8b8fa3);
            font-size: 0.9rem;
        }
        .upload-or {
            font-size: 0.8rem !important;
            opacity: 0.6;
        }
        .upload-btn {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.5rem 1.5rem;
            background: var(--accent, #5b9bd5);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .upload-btn:hover {
            opacity: 0.85;
        }
        .upload-error {
            color: #e05252;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
        .upload-loading {
            color: var(--accent, #5b9bd5);
            margin-top: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
</body>

</html>
