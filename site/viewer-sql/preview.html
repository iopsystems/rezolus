<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Iterating fast on this preview; tell browsers to always revalidate
     so a hard-reload isn't needed every time the JS changes. -->
<meta http-equiv="cache-control" content="no-cache, must-revalidate" />
<title>Rezolus Viewer (SQL backend) — preview</title>
<style>
    body {
        font-family: system-ui, sans-serif;
        margin: 0;
        color: #e0e0e0;
        background: #0a0e14;
        display: grid;
        grid-template-columns: 16em 1fr;
        min-height: 100vh;
    }
    nav {
        background: #11161e;
        border-right: 1px solid #1a1f2c;
        padding: 1em 0;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
    }
    nav h1 { font-size: 1em; margin: 0 1em 0.5em; color: #fff; }
    nav .muted { font-size: 0.75em; color: #888; margin: 0 1em 1em; line-height: 1.3; }
    nav button {
        display: block;
        width: 100%;
        background: none;
        color: #ccc;
        border: 0;
        text-align: left;
        padding: 0.4em 1em;
        cursor: pointer;
        font: inherit;
    }
    nav button:hover { background: #1a1f2c; color: #fff; }
    nav button.active { background: #1a1f2c; color: #5fb6ff; border-left: 2px solid #5fb6ff; padding-left: calc(1em - 2px); }
    nav .section-actions {
        margin: 0 1em 1em; display: flex; flex-direction: column; gap: 0.5em;
    }
    nav input[type=file] { color: #ccc; font-size: 0.8em; }
    nav .demo-btn {
        background: #2a3242; color: #fff; border: 1px solid #3a4252;
        padding: 0.4em 0.8em; border-radius: 4px; cursor: pointer;
        font-size: 0.85em;
    }
    nav .demo-btn:hover { background: #3a4252; }
    main { padding: 1em 1.5em; }
    h2 { color: #fff; margin: 0 0 0.25em; }
    .group { margin-bottom: 2em; }
    .group h3 { color: #5fb6ff; margin: 0.5em 0 0.5em; font-size: 1.1em; }
    .group p.desc { color: #888; margin: 0 0 0.75em; font-size: 0.9em; }
    .plots { display: grid; grid-template-columns: repeat(auto-fill, minmax(22em, 1fr)); gap: 0.75em; }
    .plot {
        background: #11161e; border: 1px solid #1a1f2c; border-radius: 4px;
        padding: 0.5em; display: flex; flex-direction: column;
    }
    .plot h4 { margin: 0 0 0.25em; font-size: 0.9em; color: #ccc; font-weight: 500; }
    .plot .meta { color: #666; font-size: 0.7em; margin-bottom: 0.25em; }
    .plot .chart { width: 100%; height: 180px; min-height: 180px; }
    .plot.no-sql .chart { display: flex; align-items: center; justify-content: center; color: #666; font-size: 0.8em; }
    .plot.fail { border-color: #5f1f1f; }
    .plot.fail .chart { color: #ff5f5f; font-size: 0.75em; padding: 0.5em; align-items: flex-start; overflow: auto; }
    .status { margin: 1em 1.5em; padding: 0.5em; border-radius: 4px; }
    .status.loading { background: #1a1f2c; color: #5fb6ff; }
    .status.error { background: #2a1a1a; color: #ff5f5f; white-space: pre-wrap; }
    .selection-bar {
        margin: 0.5em 1em 1em; padding: 0.5em; background: #1a1f2c; border-radius: 4px;
        font-size: 0.8em;
    }
    .selection-bar select, .selection-bar input {
        background: #0a0e14; color: #ccc; border: 1px solid #2a3242; padding: 0.25em;
        border-radius: 3px; font: inherit; width: 100%; box-sizing: border-box;
    }
    .selection-bar label { display: block; color: #888; margin-bottom: 0.25em; }
</style>
</head>
<body>
<nav>
    <h1>Rezolus SQL Viewer</h1>
    <p class="muted">Preview — runs each plot's SQL through duckdb-wasm and renders the matrix as a line chart.</p>
    <div class="section-actions">
        <input type="file" id="file" accept=".parquet" />
        <button class="demo-btn" id="demo">Demo: small (1.2 MB)</button>
        <button class="demo-btn" id="demo-large">Demo: sglang (17 MB, multi-source)</button>
    </div>
    <div class="selection-bar" id="source-bar" style="display:none"></div>
    <div class="selection-bar" id="cgroup-bar" style="display:none">
        <label>Selected cgroups (for /cgroups individual side):</label>
        <select id="cgroup-select" multiple size="5"></select>
    </div>
    <div id="section-list"></div>
</nav>
<main>
    <div id="status" class="status loading">Initializing wasm…</div>
    <div id="content"></div>
</main>
<script src="../../src/viewer/assets/lib/charts/echarts.min.js"></script>
<script type="module" src="lib/preview.js"></script>
</body>
</html>
